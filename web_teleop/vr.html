<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Go2W Sim — VR Teleop</title>
<style>
  html,body { margin:0; height:100%; background:#0b0f14; color:#e6edf3;
              font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif; }
  #ui { position:fixed; inset:0; display:flex; flex-direction:column;
        align-items:center; justify-content:center; gap:18px; text-align:center; padding:24px; }
  h1 { font-size:20px; margin:0; }
  p { color:#9fb0c0; max-width:520px; line-height:1.5; margin:0; }
  #enter { font-size:18px; font-weight:700; padding:16px 28px; border-radius:14px;
           border:none; background:#2dd4bf; color:#04201c; cursor:pointer; }
  #enter:disabled { background:#33414d; color:#7d8fa0; cursor:default; }
  #video { max-width:70vw; max-height:42vh; border-radius:10px; border:1px solid #232c36; background:#000; }
  a { color:#2dd4bf; }
  #msg { font-size:13px; color:#7d8fa0; min-height:18px; }
</style>
</head>
<body>
<div id="ui">
  <h1>Go2W Sim — VR Teleop</h1>
  <video id="video" autoplay muted playsinline></video>
  <button id="enter" disabled>checking VR…</button>
  <p>In VR: <b>left stick</b> = forward/back, <b>right stick</b> = turn. Reverse is limited. A/X cycles camera / distance / EDL / normals / spheres.
     <br>No headset? Use the <a href="/">2D page</a>.</p>
  <div id="msg"></div>
</div>

<script src="/three.min.js"></script>
<script src="/rtc.js"></script>
<script>
const FWD = 0.46, BACK = -0.30, TURN = 1.80, DEAD = 0.12, SEND_HZ = 20;

const videoEl = document.getElementById('video');
const enterBtn = document.getElementById('enter');
const msg = document.getElementById('msg');

let renderer, scene, camera, tex, channel = null, xrSession = null;

// --- lidar ---
const LIDAR_MAXPTS = 4000;     // hard cap on rendered points
const LIDAR_DMAX = 6.0;        // distance (m) mapped to the "far"/blue end of the gradient
let lidarGeo = null, lidarPos = null, lidarCol = null;
let lidarBytes = 0, lidarBytesRate = 0, lidarPts = 0;   // bandwidth tracking
let hudCanvas = null, hudCtx = null, hudTex = null;
let videoPanel = null, lidarCloud = null;               // toggled by controller
// A/X cycles: 0 camera, 1 distance, 2 EDL, 3 normals (headlight), 4 lit spheres
const MODE_NAMES = ['camera', 'distance', 'EDL', 'normals', 'spheres'];
let mode = 0, prevToggleBtn = false;
// Lit-spheres mode
const SPHERE_R = 0.03;          // sphere radius (m)
let sphereMesh = null;
const _m4 = new THREE.Matrix4(), _posV = new THREE.Vector3();
const _scaleV = new THREE.Vector3(SPHERE_R, SPHERE_R, SPHERE_R);
const _quatI = new THREE.Quaternion(), _col = new THREE.Color();

function buildScene() {
  scene = new THREE.Scene();
  camera = new THREE.PerspectiveCamera(70, 1, 0.05, 100);
  renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
  renderer.setPixelRatio(window.devicePixelRatio);
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.xr.enabled = true;
  renderer.xr.setReferenceSpaceType('local');
  document.body.appendChild(renderer.domElement);
  renderer.domElement.style.display = 'none';

  tex = new THREE.VideoTexture(videoEl);   // auto-updates each frame, hardware decoded
  tex.minFilter = THREE.LinearFilter;
  tex.magFilter = THREE.LinearFilter;
  const mat = new THREE.MeshBasicMaterial({ map: tex });
  videoPanel = new THREE.Mesh(new THREE.PlaneGeometry(1.6, 1.2), mat);
  videoPanel.position.set(0, 0, -2.0);
  scene.add(videoPanel);
  // Lights: only the lit-spheres mode uses them (video panel + points are
  // unlit). Ambient + a directional so spheres get real shading.
  scene.add(new THREE.AmbientLight(0xffffff, 0.5));
  const dir = new THREE.DirectionalLight(0xffffff, 0.9);
  dir.position.set(0.4, 0.8, 0.6);
  scene.add(dir);

  // 3D point cloud, rendered at TRUE 1:1 metric scale, centered on the user's
  // head (= the robot camera origin). A point N metres ahead of the camera shows
  // N metres ahead in VR. Per-vertex colour = distance gradient (red near→blue far).
  lidarGeo = new THREE.BufferGeometry();
  lidarPos = new Float32Array(LIDAR_MAXPTS * 3);
  lidarCol = new Float32Array(LIDAR_MAXPTS * 3);
  lidarGeo.setAttribute('position', new THREE.BufferAttribute(lidarPos, 3));
  lidarGeo.setAttribute('color', new THREE.BufferAttribute(lidarCol, 3));
  lidarGeo.setDrawRange(0, 0);
  const lmat = new THREE.PointsMaterial({ size: 0.035, vertexColors: true, sizeAttenuation: true });
  lidarCloud = new THREE.Points(lidarGeo, lmat);
  lidarCloud.position.set(0, 0, 0);        // 1:1 metric, no offset
  lidarCloud.scale.setScalar(1.0);
  // The depth cloud arrives rotated vs the VR head frame. Correction derived
  // from the observed misalignment ("yaw right 90 + roll left-ear-down 90"):
  // apply Rx(-90) then Ry(+90). Tweak these two angles if it's still off.
  {
    const qx = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(1, 0, 0),  Math.PI / 2);
    const qy = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0, 1, 0),  Math.PI / 2);
    lidarCloud.quaternion.copy(qy.multiply(qx)); // qy*qx => apply qx first, then qy
  }
  scene.add(lidarCloud);

  // Lit-spheres mode: one small instanced sphere per point, shaded by the scene
  // lights (a real 3D-rendered look). Shares the cloud's orientation correction.
  const sgeo = new THREE.SphereGeometry(1, 6, 4);   // low-poly; scaled per instance
  const smat = new THREE.MeshLambertMaterial();
  sphereMesh = new THREE.InstancedMesh(sgeo, smat, LIDAR_MAXPTS);
  sphereMesh.count = 0;
  sphereMesh.frustumCulled = false;
  sphereMesh.quaternion.copy(lidarCloud.quaternion);
  scene.add(sphereMesh);

  buildControllers();
  applyMode();

  // In-VR bandwidth HUD: a small canvas-textured plane under the video panel.
  hudCanvas = document.createElement('canvas');
  hudCanvas.width = 512; hudCanvas.height = 96;
  hudCtx = hudCanvas.getContext('2d');
  hudTex = new THREE.CanvasTexture(hudCanvas);
  const hud = new THREE.Mesh(new THREE.PlaneGeometry(1.2, 0.225),
    new THREE.MeshBasicMaterial({ map: hudTex, transparent: true }));
  hud.position.set(0, -0.78, -2.0);
  scene.add(hud);
  drawHud();
}

// Tracked controllers: a laser ray + a tip dot per hand, so you can point at
// things during demos. three.js auto-updates these groups' poses each XR frame.
function buildControllers() {
  const rayGeo = new THREE.BufferGeometry().setFromPoints(
    [new THREE.Vector3(0, 0, 0), new THREE.Vector3(0, 0, -1)]);
  for (let i = 0; i < 2; i++) {
    const ctrl = renderer.xr.getController(i);          // targetRay space (aim)
    const ray = new THREE.Line(rayGeo, new THREE.LineBasicMaterial({ color: 0x2dd4bf }));
    ray.scale.z = 5;                                    // 5 m laser
    ctrl.add(ray);
    ctrl.add(new THREE.Mesh(new THREE.SphereGeometry(0.012),
      new THREE.MeshBasicMaterial({ color: 0x2dd4bf }))); // tip dot
    scene.add(ctrl);
    const grip = renderer.xr.getControllerGrip(i);      // grip space (hand)
    grip.add(new THREE.Mesh(new THREE.SphereGeometry(0.022),
      new THREE.MeshBasicMaterial({ color: 0xdddddd })));
    scene.add(grip);
  }
}

function drawHud() {
  if (!hudCtx) return;
  hudCtx.clearRect(0, 0, 512, 96);
  hudCtx.fillStyle = 'rgba(11,15,20,0.85)';
  hudCtx.fillRect(0, 0, 512, 96);
  hudCtx.fillStyle = '#39ff14';
  hudCtx.font = 'bold 34px system-ui, sans-serif';
  hudCtx.fillText(`${MODE_NAMES[mode]}  ·  ${lidarPts} pts`, 16, 40);
  hudCtx.fillText(`${(lidarBytesRate * 8 / 1000).toFixed(0)} kbit/s`, 16, 82);
  hudTex.needsUpdate = true;
}

// Blob = [N float32 XYZ robot frame][N uint8 EDL shade][N int8 x3 normal].
// We remap robot->VR (x right, y up, z back) and colour per the current mode:
//   distance -> red(near)/green(mid)/blue(far)
//   EDL      -> grayscale edge shading
//   normals  -> grayscale Lambertian (surface curvature)
function onLidar(buf) {
  lidarBytes += buf.byteLength;
  const N = Math.floor(buf.byteLength / 16);   // 12 xyz + 1 shade + 3 normal
  if (N <= 0) return;
  const xyz = new Float32Array(buf, 0, N * 3);
  const shade = new Uint8Array(buf, N * 12, N);
  const nrm = new Int8Array(buf, N * 13, N * 3);
  const n = Math.min(N, LIDAR_MAXPTS);
  const spheres = (mode === 4);
  for (let i = 0; i < n; i++) {
    const rx = xyz[i*3], ry = xyz[i*3+1], rz = xyz[i*3+2];
    const vx = -ry, vy = rz, vz = -rx;     // robot -> VR-local (right, up, back)
    lidarPos[i*3] = vx; lidarPos[i*3 + 1] = vy; lidarPos[i*3 + 2] = vz;
    let r, g, b;
    if (mode === 2) {                      // EDL: grayscale edge shade
      const s = shade[i] / 255; r = g = b = s;
    } else if (mode === 3) {               // normals, HEADLIGHT (view-stable)
      const gx = -nrm[i*3+1] / 127, gy = nrm[i*3+2] / 127, gz = -nrm[i*3] / 127;
      const nl = Math.hypot(gx, gy, gz);
      if (nl < 0.3) { r = g = b = 0.12; }  // rejected normal (edge)
      else {
        // eye is at the origin, so view dir to this point = its position
        const pl = Math.hypot(vx, vy, vz) || 1;
        const facing = Math.abs((gx*vx + gy*vy + gz*vz) / (nl * pl));
        r = g = b = 0.15 + 0.85 * facing;
      }
    } else {                               // distance gradient (modes 1 & spheres)
      const d = Math.sqrt(rx*rx + ry*ry + rz*rz);
      const t = Math.min(d / LIDAR_DMAX, 1.0);
      r = 1 - t; g = 1 - Math.abs(t - 0.5) * 2; b = t;
    }
    lidarCol[i*3] = r; lidarCol[i*3 + 1] = g; lidarCol[i*3 + 2] = b;
    if (spheres) {
      _posV.set(vx, vy, vz);
      _m4.compose(_posV, _quatI, _scaleV);
      sphereMesh.setMatrixAt(i, _m4);
      sphereMesh.setColorAt(i, _col.setRGB(r, g, b));
    }
  }
  lidarPts = n;
  if (lidarGeo) {
    lidarGeo.setDrawRange(0, n);
    lidarGeo.attributes.position.needsUpdate = true;
    lidarGeo.attributes.color.needsUpdate = true;
  }
  if (spheres && sphereMesh) {
    sphereMesh.count = n;
    sphereMesh.instanceMatrix.needsUpdate = true;
    if (sphereMesh.instanceColor) sphereMesh.instanceColor.needsUpdate = true;
  }
}

// Bandwidth meter: once a second, snapshot bytes -> rate, refresh the HUD.
setInterval(() => {
  lidarBytesRate = lidarBytes;
  lidarBytes = 0;
  drawHud();
  if (!xrSession) {
    msg.textContent = `${MODE_NAMES[mode]} · ${lidarPts} pts · ${(lidarBytesRate*8/1000).toFixed(0)} kbit/s`;
  }
}, 1000);

// Read thumbsticks straight from the gamepad — NOT inside the render loop, so
// control timing is independent of frame rate / video.
function readSticks() {
  let vx = 0, vyaw = 0;
  if (!xrSession) return { vx, vyaw };
  for (const src of xrSession.inputSources) {
    if (!src.gamepad) continue;
    const ax = src.gamepad.axes;
    const sx = ax.length > 2 ? ax[2] : (ax[0] || 0);
    const sy = ax.length > 3 ? ax[3] : (ax[1] || 0);
    if (src.handedness === 'left'  && Math.abs(sy) > DEAD) vx = -sy * (sy < 0 ? FWD : -BACK);
    if (src.handedness === 'right' && Math.abs(sx) > DEAD) vyaw = -sx * TURN;
  }
  return { vx, vyaw };
}

// Control is sent from the XR animation loop, NOT a setInterval — browsers
// throttle setInterval during an immersive WebXR session, which made holding a
// steady turn stutter. The XR loop is compositor-driven (~72-90 Hz, rock-steady),
// and since the WebRTC VideoTexture updates itself, the loop never blocks on video.
// Outside a session we still tick via setInterval so the 2D preview can drive.
let lastSentT = 0;
function tickControl(t) {
  const { vx, vyaw } = readSticks();
  sendControl(() => channel, vx, 0, vyaw);
}
setInterval(() => { if (!xrSession) tickControl(performance.now()); }, 1000 / SEND_HZ);

// mode 0 = video; 1-3 = point cloud; 4 = lit spheres (all at true 1:1 scale).
function applyMode() {
  if (videoPanel) videoPanel.visible = (mode === 0);
  if (lidarCloud) lidarCloud.visible = (mode >= 1 && mode <= 3);
  if (sphereMesh) sphereMesh.visible = (mode === 4);
}

// A/X button (buttons[4]/[5]) cycles camera -> distance -> EDL -> normals,
// edge-detected so one press = one step.
function checkToggle() {
  if (!xrSession) return;
  let pressed = false;
  for (const src of xrSession.inputSources) {
    const b = src.gamepad && src.gamepad.buttons;
    if (b && (b[4]?.pressed || b[5]?.pressed)) pressed = true;
  }
  if (pressed && !prevToggleBtn) { mode = (mode + 1) % MODE_NAMES.length; applyMode(); }
  prevToggleBtn = pressed;
}

function onFrame(t) {
  tickControl(t);              // steady control, driven by the XR compositor
  checkToggle();
  renderer.render(scene, camera);
}

async function enterVR() {
  try {
    await videoEl.play().catch(() => {});
    xrSession = await navigator.xr.requestSession('immersive-vr',
      { optionalFeatures: ['local-floor', 'bounded-floor', 'hand-tracking'] });
    renderer.domElement.style.display = 'block';
    await renderer.xr.setSession(xrSession);
    renderer.setAnimationLoop(onFrame);
    msg.textContent = 'In VR — drive with the sticks.';
    xrSession.addEventListener('end', () => {
      sendControl(() => channel, 0, 0, 0);
      renderer.setAnimationLoop(null);
      renderer.domElement.style.display = 'none';
      xrSession = null;
      msg.textContent = 'VR session ended.';
    });
  } catch (e) { msg.textContent = 'Failed to enter VR: ' + e; }
}

async function init() {
  buildScene();
  try {
    const { getChannel } = await connectWebRTC(videoEl, { onLidar });
    channel = getChannel();
  } catch (e) { msg.textContent = 'WebRTC failed: ' + e; }

  if (!navigator.xr) { enterBtn.textContent = 'WebXR not available'; return; }
  const ok = await navigator.xr.isSessionSupported('immersive-vr').catch(() => false);
  if (!ok) { enterBtn.textContent = 'immersive-vr not supported'; return; }
  enterBtn.disabled = false;
  enterBtn.textContent = 'Enter VR';
  enterBtn.addEventListener('click', enterVR);
  renderer.setAnimationLoop(onFrame);  // keep rendering the preview before entering
}
init();
</script>
</body>
</html>
