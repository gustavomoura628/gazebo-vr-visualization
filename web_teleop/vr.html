<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Go2W Sim — VR Teleop</title>
<style>
  html,body { margin:0; height:100%; background:#0b0f14; color:#e6edf3;
              font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif; }
  #ui { position:fixed; inset:0; display:flex; flex-direction:column;
        align-items:center; justify-content:center; gap:18px; text-align:center; padding:24px; }
  h1 { font-size:20px; margin:0; }
  p { color:#9fb0c0; max-width:520px; line-height:1.5; margin:0; }
  #enter { font-size:18px; font-weight:700; padding:16px 28px; border-radius:14px;
           border:none; background:#2dd4bf; color:#04201c; cursor:pointer; }
  #enter:disabled { background:#33414d; color:#7d8fa0; cursor:default; }
  #video { max-width:70vw; max-height:42vh; border-radius:10px; border:1px solid #232c36; background:#000; }
  a { color:#2dd4bf; }
  #msg { font-size:13px; color:#7d8fa0; min-height:18px; }
</style>
</head>
<body>
<div id="ui">
  <h1>Go2W Sim — VR Teleop</h1>
  <video id="video" autoplay muted playsinline></video>
  <button id="enter" disabled>checking VR…</button>
  <p>In VR: <b>left stick</b> = forward/back, <b>right stick</b> = turn. Reverse is limited.
     <br>No headset? Use the <a href="/">2D page</a>.</p>
  <div id="msg"></div>
</div>

<script src="/three.min.js"></script>
<script src="/rtc.js"></script>
<script>
const FWD = 0.46, BACK = -0.30, TURN = 1.80, DEAD = 0.12, SEND_HZ = 20;

const videoEl = document.getElementById('video');
const enterBtn = document.getElementById('enter');
const msg = document.getElementById('msg');

let renderer, scene, camera, tex, channel = null, xrSession = null;

function buildScene() {
  scene = new THREE.Scene();
  camera = new THREE.PerspectiveCamera(70, 1, 0.05, 100);
  renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
  renderer.setPixelRatio(window.devicePixelRatio);
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.xr.enabled = true;
  renderer.xr.setReferenceSpaceType('local');
  document.body.appendChild(renderer.domElement);
  renderer.domElement.style.display = 'none';

  tex = new THREE.VideoTexture(videoEl);   // auto-updates each frame, hardware decoded
  tex.minFilter = THREE.LinearFilter;
  tex.magFilter = THREE.LinearFilter;
  const mat = new THREE.MeshBasicMaterial({ map: tex });
  const panel = new THREE.Mesh(new THREE.PlaneGeometry(1.6, 1.2), mat);
  panel.position.set(0, 0, -2.0);
  scene.add(panel);
  scene.add(new THREE.AmbientLight(0xffffff, 1.0));
}

// Read thumbsticks straight from the gamepad — NOT inside the render loop, so
// control timing is independent of frame rate / video.
function readSticks() {
  let vx = 0, vyaw = 0;
  if (!xrSession) return { vx, vyaw };
  for (const src of xrSession.inputSources) {
    if (!src.gamepad) continue;
    const ax = src.gamepad.axes;
    const sx = ax.length > 2 ? ax[2] : (ax[0] || 0);
    const sy = ax.length > 3 ? ax[3] : (ax[1] || 0);
    if (src.handedness === 'left'  && Math.abs(sy) > DEAD) vx = -sy * (sy < 0 ? FWD : -BACK);
    if (src.handedness === 'right' && Math.abs(sx) > DEAD) vyaw = -sx * TURN;
  }
  return { vx, vyaw };
}

// Independent control loop.
setInterval(() => {
  const { vx, vyaw } = readSticks();
  sendControl(() => channel, vx, 0, vyaw);
}, 1000 / SEND_HZ);

function onFrame() { renderer.render(scene, camera); }  // render only

async function enterVR() {
  try {
    await videoEl.play().catch(() => {});
    xrSession = await navigator.xr.requestSession('immersive-vr',
      { optionalFeatures: ['local-floor', 'bounded-floor', 'hand-tracking'] });
    renderer.domElement.style.display = 'block';
    await renderer.xr.setSession(xrSession);
    renderer.setAnimationLoop(onFrame);
    msg.textContent = 'In VR — drive with the sticks.';
    xrSession.addEventListener('end', () => {
      sendControl(() => channel, 0, 0, 0);
      renderer.setAnimationLoop(null);
      renderer.domElement.style.display = 'none';
      xrSession = null;
      msg.textContent = 'VR session ended.';
    });
  } catch (e) { msg.textContent = 'Failed to enter VR: ' + e; }
}

async function init() {
  buildScene();
  try {
    const { getChannel } = await connectWebRTC(videoEl);
    channel = getChannel();
  } catch (e) { msg.textContent = 'WebRTC failed: ' + e; }

  if (!navigator.xr) { enterBtn.textContent = 'WebXR not available'; return; }
  const ok = await navigator.xr.isSessionSupported('immersive-vr').catch(() => false);
  if (!ok) { enterBtn.textContent = 'immersive-vr not supported'; return; }
  enterBtn.disabled = false;
  enterBtn.textContent = 'Enter VR';
  enterBtn.addEventListener('click', enterVR);
  renderer.setAnimationLoop(onFrame);  // keep rendering the preview before entering
}
init();
</script>
</body>
</html>
