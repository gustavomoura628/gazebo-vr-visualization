<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Go2W Sim — VR Teleop</title>
<style>
  html,body { margin:0; height:100%; background:#0b0f14; color:#e6edf3;
              font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif; }
  #ui { position:fixed; inset:0; display:flex; flex-direction:column;
        align-items:center; justify-content:center; gap:18px; text-align:center; padding:24px; }
  h1 { font-size:20px; margin:0; }
  p { color:#9fb0c0; max-width:520px; line-height:1.5; margin:0; }
  #enter { font-size:18px; font-weight:700; padding:16px 28px; border-radius:14px;
           border:none; background:#2dd4bf; color:#04201c; cursor:pointer; }
  #enter:disabled { background:#33414d; color:#7d8fa0; cursor:default; }
  #video { max-width:70vw; max-height:42vh; border-radius:10px; border:1px solid #232c36; background:#000; }
  a { color:#2dd4bf; }
  #msg { font-size:13px; color:#7d8fa0; min-height:18px; }
</style>
</head>
<body>
<div id="ui">
  <h1>Go2W Sim — VR Teleop</h1>
  <video id="video" autoplay muted playsinline></video>
  <button id="enter" disabled>checking VR…</button>
  <p>In VR: <b>left stick</b> = forward/back, <b>right stick</b> = turn. Reverse is limited. A cycles lidar mode (camera/both/top/bottom). X cycles point shape (ico20/geo32/dod36/octa/cube). Y toggles flat/smooth shading. B toggles the robot model.
     <br>No headset? Use the <a href="/">2D page</a>.</p>
  <div id="msg"></div>
</div>

<script src="/three.min.js"></script>
<script src="/rtc.js"></script>
<script>
const FWD = 0.46, BACK = -0.30, TURN = 1.80, DEAD = 0.12, SEND_HZ = 20;

const videoEl = document.getElementById('video');
const enterBtn = document.getElementById('enter');
const msg = document.getElementById('msg');

let renderer, scene, camera, tex, channel = null, xrSession = null;

// --- lidar (rendered as lit spheres, coloured by distance) ---
const LIDAR_MAXPTS = 8000;     // hard cap on rendered points (two lidars combined)
const LIDAR_DMAX = 6.0;        // distance (m) -> far/blue end of the colour gradient
let lidarBytes = 0, lidarBytesRate = 0, lidarPts = 0;   // bandwidth tracking
let hudCanvas = null, hudCtx = null, hudTex = null;
let videoPanel = null;
// A cycles: 0 camera, 1 both lidars, 2 top lidar only, 3 bottom lidar only
const MODE_NAMES = ['camera', 'both', 'top', 'bottom'];
let mode = 0, prevModeBtn = false, prevRobotBtn = false, prevShapeBtn = false, prevFlatBtn = false;
let pmat = null;                // shared point material (Y toggles flat/smooth shading)
let flatShade = true;
const POINT_R = 0.03;           // point half-size (m); baked into each geometry
// X cycles the point shape so we can A/B them live in the headset.
const SHAPE_NAMES = ['ico20', 'geo32', 'dod36', 'octa', 'cube'];
let shapeIdx = 0;
let shapeMeshes = [];           // one InstancedMesh per shape; only the active is shown
let sphereMesh = null;          // == the active shape mesh (onLidar writes to it)
let lastLidarBuf = null;        // last cloud, so shape/mode switches re-render instantly
const _m4 = new THREE.Matrix4(), _posV = new THREE.Vector3();
const _scaleV = new THREE.Vector3(1, 1, 1);   // size is baked into the geometry
const _quatI = new THREE.Quaternion();

// Viewpoint: where the head sits in the robot BODY frame. Reference space is 'local',
// so the head origin maps to this eye point via the body->VR remap; everything (cloud
// + robot model) uses the same remap so they stay aligned. The eye is set behind and
// above the robot centre so you see the robot and its near surroundings.
const PLATE_Z = 0.25257;        // tower_sensor_plate_z_offset (shell_link frame)
const EYE_X = -0.40;            // 40 cm behind robot centre (body -x is back)
const EYE_Z = PLATE_Z + 0.15 + 0.10;  // 15 cm above the plate, raised another 10 cm
const LIDAR_PITCH = 0.30;       // rad, forward mount tilt (MUST MATCH the xacro/bridge)
let robotModel = null;          // to-scale simple-shape robot (B button toggles it)
// body frame (x fwd, y left, z up) -> VR (x right, y up, z back), relative to the eye.
function bodyToVR(bx, by, bz, out) { return (out || new THREE.Vector3()).set(-by, bz - EYE_Z, -bx + EYE_X); }

function buildScene() {
  scene = new THREE.Scene();
  camera = new THREE.PerspectiveCamera(70, 1, 0.05, 100);
  renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
  renderer.setPixelRatio(window.devicePixelRatio);
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.xr.enabled = true;
  renderer.xr.setReferenceSpaceType('local');
  document.body.appendChild(renderer.domElement);
  renderer.domElement.style.display = 'none';

  tex = new THREE.VideoTexture(videoEl);   // auto-updates each frame, hardware decoded
  tex.minFilter = THREE.LinearFilter;
  tex.magFilter = THREE.LinearFilter;
  const mat = new THREE.MeshBasicMaterial({ map: tex });
  videoPanel = new THREE.Mesh(new THREE.PlaneGeometry(1.6, 1.2), mat);
  videoPanel.position.set(0, 0, -2.0);
  scene.add(videoPanel);
  // Lights: only the lit-spheres mode uses them (video panel + points are
  // unlit). Ambient + a directional so spheres get real shading.
  scene.add(new THREE.AmbientLight(0xffffff, 0.5));
  const dir = new THREE.DirectionalLight(0xffffff, 0.9);
  dir.position.set(0.4, 0.8, 0.6);
  scene.add(dir);

  // 3D lidar cloud as REAL instanced low-poly solids. Billboard impostors looked
  // like flat upright cards in the periphery (screen-aligned, don't face the eye),
  // so we use honest geometry: correct from any eye angle, intersect with real
  // depth, flat-shaded by the scene lights. Three shapes are built; X cycles them
  // live so we can pick the best look. The bridge delivers BODY-frame points;
  // onLidar writes one instance matrix per point (bodyToVR remap). Size is baked in.
  // NOTE: MeshLambertMaterial ignores material.flatShading (it's Gouraud/per-vertex),
  // so flat vs smooth is controlled by the geometry's NORMALS, not the material. For
  // each shape we precompute BOTH a flat (per-face) and a smooth (radial = normalized
  // position, the true sphere normal) normal set; the Y toggle (setFlat) swaps them.
  pmat = new THREE.MeshLambertMaterial({ color: 0x9fd0ff });
  const geoms = [
    new THREE.IcosahedronGeometry(POINT_R, 0),                       // 20 tris, d20, even
    new THREE.OctahedronGeometry(POINT_R, 1),                        // 32 tris, geodesic (roundest <40)
    new THREE.DodecahedronGeometry(POINT_R, 0),                      // 36 tris, d12, gemmy
    new THREE.OctahedronGeometry(POINT_R, 0),                        // 8 tris, gem/d8
    new THREE.BoxGeometry(POINT_R * 1.5, POINT_R * 1.5, POINT_R * 1.5), // 12 tris, voxel
  ];
  for (const g of geoms) {
    g.computeVertexNormals();                          // per-face FLAT normals (non-indexed)
    const flatN = g.attributes.normal.array.slice();
    const p = g.attributes.position, smoothN = new Float32Array(p.count * 3);
    for (let i = 0; i < p.count; i++) {                // radial = smooth sphere normal
      const x = p.getX(i), y = p.getY(i), z = p.getZ(i), L = Math.hypot(x, y, z) || 1;
      smoothN[i*3] = x/L; smoothN[i*3+1] = y/L; smoothN[i*3+2] = z/L;
    }
    g.userData = { flatN, smoothN };                   // flatShade defaults true -> start flat
  }
  shapeMeshes = geoms.map((g) => {
    const m = new THREE.InstancedMesh(g, pmat, LIDAR_MAXPTS);
    m.count = 0;
    m.frustumCulled = false;
    m.visible = false;
    scene.add(m);
    return m;
  });
  sphereMesh = shapeMeshes[shapeIdx];

  buildRobot();
  buildControllers();
  applyMode();

  // In-VR bandwidth HUD: a small canvas-textured plane under the video panel.
  hudCanvas = document.createElement('canvas');
  hudCanvas.width = 512; hudCanvas.height = 96;
  hudCtx = hudCanvas.getContext('2d');
  hudTex = new THREE.CanvasTexture(hudCanvas);
  const hud = new THREE.Mesh(new THREE.PlaneGeometry(1.2, 0.225),
    new THREE.MeshBasicMaterial({ map: hudTex, transparent: true }));
  hud.position.set(0, -0.78, -2.0);
  scene.add(hud);
  drawHud();
}

// To-scale approximation of the TurtleBot4 from simple primitives, dimensions taken
// straight from the URDF (shell_link frame): Create3 base, sensor plate, 4 tower
// standoffs, the OAK-D-Pro front camera, and the two MID-360 pucks. A spatial anchor
// for the cloud, not a faithful mesh, so it's drawn translucent (cloud shows
// through). Placed via the same bodyToVR remap as the cloud so they share one frame.
// B button toggles it.
function buildRobot() {
  robotModel = new THREE.Group();
  const bodyMat  = new THREE.MeshLambertMaterial({ color: 0x9aa0a6, transparent: true, opacity: 0.40, depthWrite: false });
  const lidarMat = new THREE.MeshLambertMaterial({ color: 0x18d2d2, transparent: true, opacity: 0.85, depthWrite: false });
  const addCyl = (r, h, bx, by, bz, mat) => {
    const m = new THREE.Mesh(new THREE.CylinderGeometry(r, r, h, 20), mat);  // default axis = Y = VR up
    bodyToVR(bx, by, bz, m.position);
    robotModel.add(m);
  };
  addCyl(0.1675, 0.0925, 0, 0, -0.046, bodyMat);          // Create3 base (top ~ body z=0)
  addCyl(0.137,  0.003,  0, 0,  PLATE_Z, bodyMat);         // tower sensor plate (r=0.137)
  for (const [sx, sy] of [[0.03063, 0.11431], [0.03063, -0.11431],
                          [-0.07607, 0.09066], [-0.07607, -0.09066]])
    addCyl(0.006, 0.21, sx, sy, 0.147, bodyMat);           // 4 tower standoffs
  // OAK-D-Pro front camera (the "Kinect bar"): body box 0.0225(x) x 0.097(y) x
  // 0.03(z) at the bracket+oakd mount ~ (-0.060, 0, 0.149). body extents -> VR (y,z,x).
  const oak = new THREE.Mesh(new THREE.BoxGeometry(0.097, 0.03, 0.0225),
    new THREE.MeshLambertMaterial({ color: 0x2a2d33, transparent: true, opacity: 0.6, depthWrite: false }));
  bodyToVR(-0.060, 0, 0.149, oak.position);
  robotModel.add(oak);
  // MID-360 pucks, tilted with their real mount rpy (yaw=0). The puck axis = the
  // sensor's z; for mount R=Rz·Ry·Rx, sensor-z in body = R·[0,0,1] = [cr·sp,-sr,cr·cp].
  const _yAxis = new THREE.Vector3(0, 1, 0), _ax = new THREE.Vector3();
  const addPuck = (bx, by, bz, roll, pitch) => {
    const m = new THREE.Mesh(new THREE.CylinderGeometry(0.045, 0.045, 0.04, 20), lidarMat);
    bodyToVR(bx, by, bz, m.position);
    const cr = Math.cos(roll), sr = Math.sin(roll), cp = Math.cos(pitch), sp = Math.sin(pitch);
    _ax.set(-(-sr), cr * cp, -(cr * sp)).normalize();       // sensor-z body->VR direction
    m.quaternion.setFromUnitVectors(_yAxis, _ax);
    robotModel.add(m);
  };
  addPuck(0.10, 0, 0.313, 0,        LIDAR_PITCH);           // top: normal, pitched forward+down
  addPuck(0.10, 0, 0.193, Math.PI, -LIDAR_PITCH);          // bottom: upside-down, forward+up
  scene.add(robotModel);
}

// Tracked controllers: a laser ray + a tip dot per hand, so you can point at
// things during demos. three.js auto-updates these groups' poses each XR frame.
function buildControllers() {
  const rayGeo = new THREE.BufferGeometry().setFromPoints(
    [new THREE.Vector3(0, 0, 0), new THREE.Vector3(0, 0, -1)]);
  for (let i = 0; i < 2; i++) {
    const ctrl = renderer.xr.getController(i);          // targetRay space (aim)
    const ray = new THREE.Line(rayGeo, new THREE.LineBasicMaterial({ color: 0x2dd4bf }));
    ray.scale.z = 5;                                    // 5 m laser
    ctrl.add(ray);
    ctrl.add(new THREE.Mesh(new THREE.SphereGeometry(0.012),
      new THREE.MeshBasicMaterial({ color: 0x2dd4bf }))); // tip dot
    scene.add(ctrl);
    const grip = renderer.xr.getControllerGrip(i);      // grip space (hand)
    grip.add(new THREE.Mesh(new THREE.SphereGeometry(0.022),
      new THREE.MeshBasicMaterial({ color: 0xdddddd })));
    scene.add(grip);
  }
}

function drawHud() {
  if (!hudCtx) return;
  hudCtx.clearRect(0, 0, 512, 96);
  hudCtx.fillStyle = 'rgba(11,15,20,0.85)';
  hudCtx.fillRect(0, 0, 512, 96);
  hudCtx.fillStyle = '#39ff14';
  hudCtx.font = 'bold 34px system-ui, sans-serif';
  hudCtx.fillText(`${MODE_NAMES[mode]} · ${SHAPE_NAMES[shapeIdx]} ${flatShade ? 'flat' : 'smooth'} · ${lidarPts} pts`, 16, 40);
  hudCtx.fillText(`${(lidarBytesRate * 8 / 1000).toFixed(0)} kbit/s`, 16, 82);
  hudTex.needsUpdate = true;
}

// Blob = [uint32 n_top][float32 XYZ top...][float32 XYZ bottom...] (robot frame).
// mode 2 = top only, 3 = bottom only, 1 = both.
function onLidar(buf) {
  lidarBytes += buf.byteLength;
  if (buf.byteLength < 4) return;
  lastLidarBuf = buf;                        // cache so shape/mode switches re-render
  renderCloud();
}

// Write one instance matrix per point into the ACTIVE shape mesh, for the cached
// cloud + current mode. Called on each new cloud and on shape/mode switches.
function renderCloud() {
  const buf = lastLidarBuf;
  if (!buf || !sphereMesh) return;
  const nTop = new DataView(buf).getUint32(0, true);
  const N = Math.floor((buf.byteLength - 4) / 12);   // points after the header
  const xyz = new Float32Array(buf, 4, N * 3);
  let start = 0, end = N;
  if (mode === 2) { start = 0; end = Math.min(nTop, N); }        // top
  else if (mode === 3) { start = Math.min(nTop, N); end = N; }   // bottom
  const count = Math.min(end - start, LIDAR_MAXPTS);
  for (let j = 0; j < count; j++) {
    const i = start + j;
    bodyToVR(xyz[i*3], xyz[i*3+1], xyz[i*3+2], _posV);  // robot -> VR, relative to the eye
    _m4.compose(_posV, _quatI, _scaleV);
    sphereMesh.setMatrixAt(j, _m4);
  }
  lidarPts = count;
  sphereMesh.count = count;
  sphereMesh.instanceMatrix.needsUpdate = true;
}

// Bandwidth meter: once a second, snapshot bytes -> rate, refresh the HUD.
setInterval(() => {
  lidarBytesRate = lidarBytes;
  lidarBytes = 0;
  drawHud();
  if (!xrSession) {
    msg.textContent = `${MODE_NAMES[mode]} · ${lidarPts} pts · ${(lidarBytesRate*8/1000).toFixed(0)} kbit/s`;
  }
}, 1000);

// Read thumbsticks straight from the gamepad — NOT inside the render loop, so
// control timing is independent of frame rate / video.
function readSticks() {
  let vx = 0, vyaw = 0;
  if (!xrSession) return { vx, vyaw };
  for (const src of xrSession.inputSources) {
    if (!src.gamepad) continue;
    const ax = src.gamepad.axes;
    const sx = ax.length > 2 ? ax[2] : (ax[0] || 0);
    const sy = ax.length > 3 ? ax[3] : (ax[1] || 0);
    if (src.handedness === 'left'  && Math.abs(sy) > DEAD) vx = -sy * (sy < 0 ? FWD : -BACK);
    if (src.handedness === 'right' && Math.abs(sx) > DEAD) vyaw = -sx * TURN;
  }
  return { vx, vyaw };
}

// Control is sent from the XR animation loop, NOT a setInterval — browsers
// throttle setInterval during an immersive WebXR session, which made holding a
// steady turn stutter. The XR loop is compositor-driven (~72-90 Hz, rock-steady),
// and since the WebRTC VideoTexture updates itself, the loop never blocks on video.
// Outside a session we still tick via setInterval so the 2D preview can drive.
let lastSentT = 0;
function tickControl(t) {
  const { vx, vyaw } = readSticks();
  sendControl(() => channel, vx, 0, vyaw);
}
setInterval(() => { if (!xrSession) tickControl(performance.now()); }, 1000 / SEND_HZ);

// mode 0 = video panel; modes 1-3 = 3D lidar points (both / top / bottom). Only the
// active shape mesh is shown, and only when a lidar mode is selected.
function applyMode() {
  if (videoPanel) videoPanel.visible = (mode === 0);
  for (let i = 0; i < shapeMeshes.length; i++)
    shapeMeshes[i].visible = (i === shapeIdx && mode >= 1);
}

// Switch the active point shape and repopulate it from the cached cloud.
function setShape(idx) {
  shapeIdx = idx;
  sphereMesh = shapeMeshes[idx];
  applyMode();
  renderCloud();
  drawHud();
}

// Flip flat/smooth shading by swapping each geometry's precomputed normal set
// (Lambert is Gouraud, so shading follows the normals, not material.flatShading).
function setFlat(on) {
  flatShade = on;
  for (const m of shapeMeshes) {
    const g = m.geometry, ud = g.userData;
    if (!ud || !ud.flatN) continue;
    g.attributes.normal.array.set(on ? ud.flatN : ud.smoothN);
    g.attributes.normal.needsUpdate = true;
  }
  drawHud();
}

// Left controller:  X (btn4) cycles point shape, Y (btn5) toggles flat/smooth.
// Right controller: A (btn4) cycles lidar mode,  B (btn5) toggles the robot model.
// All edge-detected so one press = one step.
function checkToggle() {
  if (!xrSession) return;
  let shapeBtn = false, modeBtn = false, flatBtn = false, robotBtn = false;
  for (const src of xrSession.inputSources) {
    const b = src.gamepad && src.gamepad.buttons;
    if (!b) continue;
    const left = src.handedness === 'left';
    if (b[4]?.pressed) { if (left) shapeBtn = true; else modeBtn = true; }
    if (b[5]?.pressed) { if (left) flatBtn  = true; else robotBtn = true; }
  }
  if (modeBtn  && !prevModeBtn)  { mode = (mode + 1) % MODE_NAMES.length; applyMode(); renderCloud(); }
  if (shapeBtn && !prevShapeBtn) setShape((shapeIdx + 1) % SHAPE_NAMES.length);
  if (flatBtn  && !prevFlatBtn)  setFlat(!flatShade);
  if (robotBtn && !prevRobotBtn && robotModel) robotModel.visible = !robotModel.visible;
  prevModeBtn = modeBtn; prevShapeBtn = shapeBtn; prevFlatBtn = flatBtn; prevRobotBtn = robotBtn;
}

function onFrame(t) {
  tickControl(t);              // steady control, driven by the XR compositor
  checkToggle();
  renderer.render(scene, camera);
}

async function enterVR() {
  try {
    await videoEl.play().catch(() => {});
    xrSession = await navigator.xr.requestSession('immersive-vr',
      { optionalFeatures: ['local-floor', 'bounded-floor', 'hand-tracking'] });
    renderer.domElement.style.display = 'block';
    await renderer.xr.setSession(xrSession);
    renderer.setAnimationLoop(onFrame);
    msg.textContent = 'In VR — drive with the sticks.';
    xrSession.addEventListener('end', () => {
      sendControl(() => channel, 0, 0, 0);
      renderer.setAnimationLoop(null);
      renderer.domElement.style.display = 'none';
      xrSession = null;
      msg.textContent = 'VR session ended.';
    });
  } catch (e) { msg.textContent = 'Failed to enter VR: ' + e; }
}

async function init() {
  buildScene();
  try {
    const { getChannel } = await connectWebRTC(videoEl, { onLidar });
    channel = getChannel();
  } catch (e) { msg.textContent = 'WebRTC failed: ' + e; }

  if (!navigator.xr) { enterBtn.textContent = 'WebXR not available'; return; }
  const ok = await navigator.xr.isSessionSupported('immersive-vr').catch(() => false);
  if (!ok) { enterBtn.textContent = 'immersive-vr not supported'; return; }
  enterBtn.disabled = false;
  enterBtn.textContent = 'Enter VR';
  enterBtn.addEventListener('click', enterVR);
  renderer.setAnimationLoop(onFrame);  // keep rendering the preview before entering
}
init();
</script>
</body>
</html>
