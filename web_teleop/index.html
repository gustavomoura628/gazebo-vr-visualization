<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>Go2W Sim Teleop</title>
<style>
  :root { --accent:#2dd4bf; --bg:#0b0f14; --panel:#151c24; }
  * { box-sizing:border-box; }
  html,body { margin:0; height:100%; background:var(--bg); color:#e6edf3;
              font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif; }
  .wrap { display:flex; flex-direction:column; height:100%; }
  header { padding:8px 14px; display:flex; align-items:center; gap:14px;
           background:var(--panel); border-bottom:1px solid #232c36; }
  header h1 { font-size:15px; margin:0; font-weight:600; }
  header a { color:var(--accent); font-size:13px; text-decoration:none; }
  #status { font-size:13px; color:#9fb0c0; margin-left:auto; font-variant-numeric:tabular-nums; }
  .stage { flex:1; display:flex; align-items:center; justify-content:center;
           background:#000; position:relative; overflow:hidden; }
  #video { max-width:100%; max-height:100%; }
  .pad { display:grid; grid-template-columns:repeat(3,72px); grid-template-rows:repeat(2,72px);
         gap:8px; padding:14px; justify-content:center; background:var(--panel);
         border-top:1px solid #232c36; }
  .btn { display:flex; align-items:center; justify-content:center; user-select:none;
         border-radius:12px; background:#1f2a35; border:1px solid #2c3a47; color:#e6edf3;
         font-size:24px; font-weight:700; touch-action:none; cursor:pointer; }
  .btn:active, .btn.on { background:var(--accent); color:#04201c; }
  .btn.stop { background:#3a1f24; border-color:#5a2a30; font-size:14px; }
  .btn.stop:active { background:#ef4444; color:#fff; }
  .hint { padding:6px 14px 12px; font-size:12px; color:#7d8fa0; text-align:center;
          background:var(--panel); }
  .hint b { color:#9fb0c0; }
  .stats { position:absolute; top:8px; left:8px; padding:8px 10px; border-radius:8px;
           background:rgba(11,15,20,0.78); color:#39ff14; white-space:pre;
           font:600 13px/1.45 ui-monospace,SFMono-Regular,Menlo,monospace;
           pointer-events:none; font-variant-numeric:tabular-nums; }
  #cloudBtn { font-size:13px; padding:4px 10px; border-radius:8px; cursor:pointer;
              background:#1f2a35; border:1px solid #2c3a47; color:#e6edf3; }
  #cloudBtn.on { background:var(--accent); color:#04201c; border-color:var(--accent); }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>Go2W Sim Teleop</h1>
    <a href="/vr.html">Enter VR ▸</a>
    <button id="cloudBtn" class="on">Cloud: ON</button>
    <div id="status">connecting…</div>
  </header>

  <div class="stage">
    <video id="video" autoplay muted playsinline></video>
    <div id="stats" class="stats">connecting…</div>
  </div>

  <div class="pad">
    <div></div>
    <div class="btn" data-vx="1">▲</div>
    <div></div>
    <div class="btn" data-vyaw="1">◀</div>
    <div class="btn stop" data-stop="1">STOP</div>
    <div class="btn" data-vyaw="-1">▶</div>
  </div>
  <div class="hint">
    Keyboard: <b>W/S</b> fwd/back · <b>A/D</b> turn · hold buttons to drive.
    Video over WebRTC, control over a separate data channel.
  </div>
</div>

<script src="/rtc.js"></script>
<script>
const FWD = 0.46, BACK = -0.30, TURN = 1.80, SEND_HZ = 20;
let vx = 0, vyaw = 0;
const keys = {};
let channel = null;

function recompute() {
  let fx = 0, fz = 0;
  if (keys['w'] || keys['arrowup'])    fx += FWD;
  if (keys['s'] || keys['arrowdown'])  fx += BACK;
  if (keys['a'] || keys['arrowleft'])  fz += TURN;
  if (keys['d'] || keys['arrowright']) fz -= TURN;
  for (const b of document.querySelectorAll('.btn.on')) {
    if (b.dataset.vx)   fx += (+b.dataset.vx) * FWD;
    if (b.dataset.vyaw) fz += (+b.dataset.vyaw) * TURN;
  }
  vx = fx; vyaw = fz;
}

addEventListener('keydown', e => {
  const k = e.key.toLowerCase();
  if (['w','a','s','d','arrowup','arrowdown','arrowleft','arrowright'].includes(k)) {
    keys[k] = true; recompute(); e.preventDefault();
  }
});
addEventListener('keyup', e => { const k=e.key.toLowerCase(); if (k in keys){ keys[k]=false; recompute(); } });

for (const b of document.querySelectorAll('.btn')) {
  const press = e => { e.preventDefault(); if (b.dataset.stop){ stopAll(); return; } b.classList.add('on'); recompute(); };
  const release = e => { e.preventDefault(); b.classList.remove('on'); recompute(); };
  b.addEventListener('pointerdown', press);
  b.addEventListener('pointerup', release);
  b.addEventListener('pointerleave', release);
  b.addEventListener('pointercancel', release);
}
function stopAll() {
  for (const k in keys) keys[k] = false;
  for (const b of document.querySelectorAll('.btn.on')) b.classList.remove('on');
  vx = vyaw = 0;
}

// Control loop — independent of video / rendering.
setInterval(() => { sendControl(() => channel, vx, 0, vyaw); }, 1000 / SEND_HZ);

// Status
const statusEl = document.getElementById('status');
setInterval(() => {
  const link = channel && channel.readyState === 'open' ? 'RTC' : 'http';
  statusEl.textContent = `${link} · vx ${vx.toFixed(2)} vyaw ${vyaw.toFixed(2)}`;
}, 150);

// --- video instrumentation overlay + cloud toggle ---
const statsEl = document.getElementById('stats');
let cloudOn = true, clockOffset = null, latencyMs = null, contentFps = 0;
const fmtbps = k => k >= 1000 ? (k / 1000).toFixed(2) + ' Mbps' : Math.round(k) + ' kbps';
function renderStats(s) {
  const rtt = s.rttMs != null ? s.rttMs.toFixed(0) + 'ms' : '—';
  const e2e = latencyMs != null ? Math.round(latencyMs) + 'ms' : '—';
  statsEl.textContent =
    `latency ${e2e}   fps ${contentFps.toFixed(1)} (enc ${s.fps})   ${s.w}x${s.h}\n` +
    `video ${fmtbps(s.vkbps)}   total ${fmtbps(s.tkbps)}   cloud:${cloudOn ? 'ON' : 'OFF'}\n` +
    `net RTT ${rtt}   jbuf ${s.jbMs.toFixed(0)}ms   loss ${s.loss}`;
}
const cloudBtn = document.getElementById('cloudBtn');
cloudBtn.addEventListener('click', () => {
  cloudOn = !cloudOn;
  setCloud(() => channel, cloudOn);
  cloudBtn.classList.toggle('on', cloudOn);
  cloudBtn.textContent = 'Cloud: ' + (cloudOn ? 'ON' : 'OFF');
});

// Connect
(async () => {
  try {
    const video = document.getElementById('video');
    const { pc, getChannel } = await connectWebRTC(video);
    channel = getChannel();
    statusEl.textContent = 'connected';
    startStats(pc, renderStats);
    clockOffset = await syncClock();                       // initial clock offset
    setInterval(async () => { const o = await syncClock(); if (o != null) clockOffset = o; }, 15000);
    startLatencyMeter(video, () => clockOffset, m => { latencyMs = m.latencyMs; contentFps = m.fps; });
  } catch (e) {
    statusEl.textContent = 'WebRTC failed: ' + e;
    statsEl.textContent = 'WebRTC failed';
  }
})();
</script>
</body>
</html>
